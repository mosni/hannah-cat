# hannah.cat â€” static site.
# certbot --nginx adds the 443 server blocks.
server {
    server_name hannah.cat;
    root /srv/stack/apps/hannah-cat/public;
    index index.html;
    location ~ /\.            { return 404; }   # dotfiles incl. .git
    location ~* ^/(nginx\.conf|README\.md|\.gitignore)$ { return 404; }
    location / { try_files $uri $uri/ =404; }
    listen 80;
}
