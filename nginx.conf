# hannah.cat â€” static site.
# certbot --nginx adds the 443 server blocks.
server {
    server_name hannah.cat;
    root /srv/stack/apps/hannah-cat/public;
    index index.html;
    location ~ /\.            { return 404; }   # dotfiles incl. .git
    location ~* ^/(nginx\.conf|README\.md|\.gitignore)$ { return 404; }
    location / { try_files $uri $uri/ =404; }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hannah.cat/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hannah.cat/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = hannah.cat) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name hannah.cat;
    listen 80;
    return 404; # managed by Certbot


}